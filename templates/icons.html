{# Inline Lucide-derived SVG icons. Hand-copied paths (no npm dep) — the set
   is small enough that maintaining 8 icons by hand beats pulling lucide-static.
   All icons use stroke="currentColor" so the parent button's color drives them. #}
{% macro icon(name, size=20) -%}
<svg width="{{ size }}" height="{{ size }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
{%- if name == "external-link" -%}<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
{%- elif name == "play" -%}<polygon points="6 3 20 12 6 21 6 3"/>
{%- elif name == "x" -%}<path d="M18 6 6 18"/><path d="m6 6 12 12"/>
{%- elif name == "heart" -%}<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
{%- elif name == "heart-filled" -%}<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" fill="currentColor"/>
{%- elif name == "printer" -%}<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/>
{%- elif name == "chevron-down" -%}<polyline points="6 9 12 15 18 9"/>
{%- elif name == "chevron-up" -%}<polyline points="18 15 12 9 6 15"/>
{%- endif -%}
</svg>
{%- endmacro %}
