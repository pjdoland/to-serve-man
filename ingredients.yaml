# Ingredient ontology for canonicalization.
#
# Each entry maps a canonical ingredient id (kebab-case slug; the dedup key
# and future URL fragment) to a category and an optional list of input
# aliases. When a recipe's frontmatter or .cook body uses one of the aliases
# (case-insensitive, whitespace-trimmed), it gets bucketed under the
# canonical id.
#
# Categories are deliberately broad — spirit, modifier, juice, syrup,
# bitters, garnish, ice, dairy, other — and drive future faceting
# (allergens, build-a-bar, shopping-list grouping) without committing to a
# product hierarchy.
#
# CONSERVATIVE merges only: combine variants that are unambiguously the same
# ingredient (case/punctuation/diacritic drift, the "fresh" prefix on
# citrus, plurals/singulars of garnishes). Do NOT merge spec-distinct items
# — "aged Jamaican rum" and "gold Jamaican rum" are different products even
# though both are Jamaican rums; "honey syrup" and "rich honey mix" are
# different concentrations. Authorial intent is preserved by leaving them
# separate.
#
# Long-tail ingredients (used in 1–2 recipes) intentionally aren't covered;
# they fall through canonicalization as their slugified raw name. The build
# report logs ontology coverage so it's visible when a new common ingredient
# starts to appear.

ingredients:
  # --- Citrus juices (the "fresh" prefix is implied in cocktail context) ---
  - { id: lime-juice, category: juice, aliases: [fresh lime juice, lime juice] }
  - { id: lemon-juice, category: juice, aliases: [fresh lemon juice, lemon juice] }
  - { id: orange-juice, category: juice, aliases: [fresh orange juice, orange juice] }
  - { id: grapefruit-juice, category: juice,
      aliases: [fresh grapefruit juice, fresh white grapefruit juice, white grapefruit juice] }
  - { id: pineapple-juice, category: juice,
      aliases: [pineapple juice, fresh pineapple juice, unsweetened pineapple juice] }
  - { id: passion-fruit-juice, category: juice, aliases: [passion fruit juice] }
  - { id: guava-juice, category: juice, aliases: [guava juice] }

  # --- Rums: each spec is a distinct ingredient. Aliases collapse only true
  #     synonyms (capitalization, hyphenation, "Bacardi white rum" → white
  #     Cuban-style rum since that's the historical category).
  - { id: light-puerto-rican-rum, category: spirit, aliases: [light Puerto Rican rum] }
  - { id: gold-puerto-rican-rum, category: spirit, aliases: [gold Puerto Rican rum] }
  - { id: dark-jamaican-rum, category: spirit, aliases: [dark Jamaican rum] }
  - { id: gold-jamaican-rum, category: spirit, aliases: [gold Jamaican rum] }
  - { id: aged-pot-still-jamaican-rum, category: spirit,
      aliases: [aged pot-still Jamaican rum, aged Jamaican rum] }
  - { id: white-cuban-style-rum, category: spirit,
      aliases: [white Cuban-style rum, white Cuban rum, light Cuban-style rum,
                light white rum, white rum, Bacardi white rum] }
  - { id: aged-cuban-style-rum, category: spirit,
      aliases: [aged Cuban-style rum, gold Cuban-style rum] }
  - { id: aged-demerara-rum, category: spirit, aliases: [aged Demerara rum, Demerara rum] }
  - { id: 151-proof-demerara-rum, category: spirit,
      aliases: [151-proof Demerara rum, 151 proof Demerara rum] }
  - { id: 151-proof-rum, category: spirit, aliases: [151-proof rum] }
  - { id: dark-rum, category: spirit, aliases: [dark rum, black blended rum] }
  - { id: blended-aged-rum, category: spirit, aliases: [blended aged rum] }
  - { id: aged-martinique-agricole, category: spirit,
      aliases: [aged Martinique agricole, aged Martinique rhum agricole] }
  - { id: gold-barbados-rum, category: spirit, aliases: [gold Barbados rum] }
  - { id: amber-virgin-islands-rum, category: spirit, aliases: [amber Virgin Islands rum] }
  - { id: puerto-rican-rum, category: spirit, aliases: [Puerto Rican rum] }
  - { id: coconut-rum, category: spirit, aliases: [coconut rum] }

  # --- Other spirits ---
