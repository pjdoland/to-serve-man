name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_URL: /to-serve-man
      SITE_URL: https://pjdoland.github.io/to-serve-man
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          # PAT with read access to pjdoland/tiki-book. Default GITHUB_TOKEN
          # cannot fetch a private cross-repo submodule.
          token: ${{ secrets.TIKI_BOOK_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - run: pip install -e ".[dev]"
      - run: npm install

      - name: Lint (ruff)
        run: ruff check . && ruff format --check .

      - name: Validate recipes
        run: python build.py validate

      - name: Run tests
        run: python -m unittest discover -s tests -t . -v

      - name: Build site
        # --strict so a broken serve_with/pairs_with/uses cross-ref fails the
        # deploy instead of warn-and-shipping a dangling link.
        run: python build.py site --strict

      - name: Generate LaTeX source
        run: python build.py latex

      - name: Clear stale PDF before compile
        # latexmk without -f stops on errors and won't write a partial PDF, but
        # the runner's working tree may still hold one from a prior step. Wipe
        # so the verify step below catches a missing-output failure cleanly.
        run: rm -f output/cookbook.pdf

      - name: Compile PDF
        uses: xu-cheng/latex-action@4.1.0
        with:
          working_directory: output
          root_file: cookbook.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode
        continue-on-error: true

      - name: Verify PDF was produced
        run: test -s output/cookbook.pdf

      - name: Copy PDF into site
        run: cp output/cookbook.pdf docs/cookbook.pdf

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
